server:
  port: 8080
spring:
  application:
    name: google-places-backend
management:
  endpoints:
    web:
      exposure:
        include: health,info
google:
  places:
    api-key: ${GOOGLE_MAPS_API_KEY:}
    autocomplete-url: https://maps.googleapis.com/maps/api/place/autocomplete/json
    details-url: https://maps.googleapis.com/maps/api/place/details/json
    country: us
    language: en
    request-timeout-ms: 5000
app:
  cors:
    allowed-origins: http://localhost:5173
